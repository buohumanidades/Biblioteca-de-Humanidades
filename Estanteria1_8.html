<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ubicación del Libro | Biblioteca</title>
    <style>
        /* Ajuste estricto a la pantalla del móvil sin scroll */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita el scroll */
            background-color: #f4f6f7;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px; /* Margen exterior mínimo */
            box-sizing: border-box;
        }

        .container { 
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            height: 100%; /* Ocupa el alto disponible */
            background: #fff; 
            padding: 15px; 
            border-radius: 12px; 
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }
        
        /* Cabecera compacta */
        h1 { 
            font-family: 'Romana Moderna', Georgia, serif; 
            color: #1a252f; 
            text-align: center; 
            border-bottom: 2px solid #ecf0f1; 
            padding-bottom: 8px; 
            font-size: 1.4em; /* Letra más pequeña */
            margin: 0 0 12px 0;
            flex-shrink: 0; /* Evita que el título se aplaste */
        }

        /* Diseño de la ruta (Más compacto) */
        .location-route {
            background-color: #f8f9fa;
            border-left: 4px solid #3498db;
            padding: 10px 10px 10px 15px;
            border-radius: 0 10px 10px 0;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px; /* Menos espacio entre pasos */
            flex-shrink: 0;
        }

        .route-step {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em; /* Letra ajustada */
            color: #34495e;
            font-weight: 600;
        }

        .route-step.final-step {
            color: #2980b9;
            font-size: 1.1em;
            font-weight: 800;
            background: #ebf5fb;
            padding: 6px 12px;
            border-radius: 6px;
            margin-left: -10px; 
            box-shadow: 0 2px 4px rgba(41, 128, 185, 0.15);
            border: 1px solid #d6eaf8;
        }

        .icon {
            font-size: 1.1em;
        }

        /* Contenedor de la imagen (Se adapta al espacio sobrante) */
        .image-container {
            flex-grow: 1; /* Ocupa todo el espacio vertical sobrante */
            min-height: 0; /* Clave para que Flexbox permita achicar la imagen */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .shelf-image {
            max-width: 100%;
            max-height: 100%; /* Nunca será más alta que el espacio disponible */
            width: auto;
            height: auto;
            object-fit: contain; /* Garantiza que se vea entera sin recortar NADA */
            border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.12);
            border: 1px solid #ecf0f1;
        }

        /* Botón de Nueva Búsqueda */
        .btn-new-search {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            font-size: 1.05em;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            color: #ffffff;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            box-shadow: 0 4px 10px rgba(44, 62, 80, 0.3);
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .btn-new-search:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(44, 62, 80, 0.3);
            background: #1a252f;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Cabecera -->
        <h1>Biblioteca de Humanidades</h1>

        <!-- Ruta de localización -->
        <div class="location-route">
            <div class="route-step">
                <span class="icon">📍</span> PLANTA 1
            </div>
            <div class="route-step">
                <span class="icon">⬅️</span> Sala de la izquierda
            </div>
            <div class="route-step">
                <span class="icon">➡️</span> Estantes de la derecha
            </div>
            <div class="route-step final-step">
                <span class="icon">📚</span> Estante nº 1
            </div>
        </div>

        <!-- Imagen de la estantería (Ajuste inteligente al espacio) -->
        <div class="image-container">
            <img src="Estanteria1_8.jpg" alt="Vista del Estante nº 1" class="shelf-image">
        </div>

        <!-- Botón para nueva búsqueda -->
        <a href="Signatura1.html" class="btn-new-search">
            <span class="icon">🔄</span> Nueva búsqueda
        </a>
    </div>
</body>
</html>
