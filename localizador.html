<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesando Signatura...</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f6f7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #2c3e50;
        }
        .loader-container {
            text-align: center;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 90%;
        }
        /* Spinner animado */
        .spinner {
            border: 5px solid #ecf0f1;
            border-top: 5px solid #2980b9; 
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            font-family: 'Romana Moderna', Georgia, serif;
            color: #1a252f;
            margin-bottom: 10px;
            font-size: 1.5em;
        }
        p {
            color: #7f8c8d;
            font-size: 0.95em;
            line-height: 1.4;
        }
        /* Estilos para el botón de error */
        .btn-volver {
            background-color: #e67e22; /* Tono naranja */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }
        .btn-volver:hover {
            background-color: #d35400; /* Naranja más oscuro al pasar el ratón */
        }
        .icono-error {
            font-size: 3em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="loader-container" id="contenedor-principal">
        <div class="spinner"></div>
        <h2>Buscando ubicación...</h2>
        <p>Comprobando la signatura en la base de datos de la biblioteca.</p>
    </div>

    <script>
        // 1. Capturamos la signatura enviada por la URL desde Signatura.html
        const params = new URLSearchParams(window.location.search);
        const sigBuscada = params.get('sig');

        // 2. DICCIONARIO DE SIGNATURAS
        const baseDatos = {
            "HG860/729.09": "Estanteria1_8.html",
            "HG860/729": "Estanteria1_8.html",
            "HG860/728": "Estanteria1_8.html",
            "HG860/72.09": "Estanteria1_8.html",
            "HG860/72": "Estanteria1_8.html",
            "HG860/7.09": "Estanteria1_8.html",
            "HG860/7/03": "Estanteria1_8.html",
            "HG860/7": "Estanteria1_8.html",
            // Puedes ir añadiendo todas las que necesites aquí debajo...
        };

        // 3. Lógica para comprobar si la signatura existe
        setTimeout(() => {
            if (sigBuscada && baseDatos[sigBuscada]) {
                window.location.href = baseDatos[sigBuscada];
            } else {
                // Modificamos el DOM directamente en lugar de usar alert()
                const contenedor = document.getElementById('contenedor-principal');
                contenedor.innerHTML = `
                    <div class="icono-error">⚠️</div>
                    <h2>Signatura no encontrada</h2>
                    <p>La signatura no existe o es incorrecta. Puedes realizar la comprobación en el catálogo.</p>
                    <p><strong>Signatura buscada:</strong> ${sigBuscada || "Ninguna"}</p>
                    <button class="btn-volver" onclick="window.history.back()">Volver al buscador</button>
                `;
            }
        }, 600);
    </script>
</body>
</html>
