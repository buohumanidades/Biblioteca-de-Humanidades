<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Humanidades | Búsqueda</title>
    <style>
        /* Estilos generales optimizados para móviles */
        body { 
            font-family: Arial, sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            padding: 15px; 
            background-color: #f4f6f7; 
            color: #2c3e50; 
        }
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: #fff; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.06); 
        }
        
        /* Cabecera */
        h1 { 
            font-family: 'Romana Moderna', Georgia, serif; 
            color: #1a252f; 
            text-align: center; 
            border-bottom: 2px solid #ecf0f1; 
            padding-bottom: 15px; 
            font-size: 1.8em; 
            margin-top: 0;
        }
        .subtitle { 
            text-align: center; 
            font-weight: bold; 
            color: #7f8c8d; 
            margin-bottom: 25px; 
            font-size: 0.9em; 
        }
        
        /* Montaje solapado: Foto + Círculo exacto a la imagen */
        .hero-overlap {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0 30px 0;
        }

        .shelf-photo {
            width: 210px;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            z-index: 1;
        }

        .circle-badge {
            width: 145px;
            height: 145px;
            background-color: #dce6f1; /* Fondo claro interior */
            border: 14px solid #5b9bd5; /* Aro exterior azul */
            border-radius: 50%;
            margin-left: -40px; /* Efecto de solapamiento sobre la foto */
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;
            padding: 10px;
            font-weight: 800;
            color: #000;
            font-size: 1.05em;
            line-height: 1.25;
        }

        /* Botones de navegación con iconos */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .nav-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: #ebf5fb;
            border: 2px solid #2980b9;
            border-radius: 8px;
            text-decoration: none;
            color: #1b4f72;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.2s ease;
        }

        .nav-button:active, .nav-button:hover {
            background: #2980b9;
            color: #ffffff;
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-icon {
            font-size: 1.2em;
        }

        /* Servicios Adicionales */
        h2.section-title { 
            color: #2980b9; 
            font-size: 1.2em; 
            margin-top: 25px; 
            border-left: 4px solid #2980b9; 
            padding-left: 10px;
        }

        .links a { 
            display: block; 
            padding: 12px; 
            background: #ecf0f1; 
            text-decoration: none; 
            color: #2c3e50; 
            margin-bottom: 10px; 
            border-radius: 6px; 
            text-align: center; 
            font-weight: bold; 
            transition: background 0.3s;
        }
        .links a:hover { 
            background: #d5dbdb; 
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Cabecera -->
        <h1>Biblioteca de Humanidades</h1>
        <div class="subtitle">Lenguaje, Lingüística, Literatura</div>

        <!-- Sección solapada de foto y círculo -->
        <div class="hero-overlap">
            <img src="estantes.jpg" alt="Estantería" class="shelf-photo" onerror="this.src='https://via.placeholder.com/210x140?text=Estantes'">
            <div class="circle-badge">
                Necesito<br>encontrar<br>un libro
            </div>
        </div>

        <!-- Accesos con sus iconos correspondientes -->
        <div class="options-container">
            <a href="materia.html" class="nav-button">
                <div class="btn-content">
                    <span class="btn-icon">🔍</span>
                    <span>Por materia</span>
                </div>
                <span>➔</span>
            </a>

            <a href="Signatura.html" class="nav-button">
                <div class="btn-content">
                    <span class="btn-icon">📌</span>
                    <span>Sé la signatura</span>
                </div>
                <span>➔</span>
            </a>
        </div>

        <!-- Servicios Adicionales -->
        <h2 class="section-title">💻 Servicios Adicionales</h2>
        <div class="links">
            <a href="https://absysweb.cpd.uniovi.es/cgi-bin/abnetopac?ACC=101" target="_blank">Búsqueda general en el catálogo</a>
            <a href="https://buo.uniovi.es/" target="_blank">Portal de la Biblioteca (BUO)</a>
        </div>
    </div>
</body>
</html>
